<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/github-logo.png" type="image/png" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Geist', sans-serif;
        }
    </style>
    <title>GitHub Issues Tracker</title>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-md w-full max-w-sm px-8 py-10 mx-4">

        <!-- Logo -->
        <div class="flex justify-center mb-4">
            <div class="bg-gray-900 rounded-full w-16 h-16 flex items-center justify-center">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-10 h-10 invert" />
            </div>
        </div>

        <!-- Title -->
        <h1 class="text-center text-xl font-bold text-gray-900">GitHub Issues Tracker</h1>
        <p class="text-center text-sm text-gray-500 mt-1 mb-6">Sign in to manage your issues</p>

        <!-- Login Form -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-800 mb-1">Username</label>
                <input
                    id="usernameField"
                    type="text"
                    placeholder="Enter Username"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400"
                />
                <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-800 mb-1">Password</label>
                <input
                    id="passwordField"
                    type="password"
                    placeholder="Enter Password"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400"
                />
                <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
            </div>
            <button
                id="signInBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors mt-2"
            >
                Sign In
            </button>
        </div>

        <!-- Divider -->
        <div class="flex items-center my-5">
            <div class="flex-1 border-t border-gray-200"></div>
            <span class="mx-3 text-sm text-gray-400">OR</span>
            <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <!-- Demo Credentials -->
        <div class="bg-gray-50 rounded-lg px-4 py-3 text-center text-sm text-gray-600">
            <p class="font-medium text-gray-700 mb-1">Demo Credentials:</p>
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
        </div>

    </div>

    <script src="script/login.js"></script>
</body>

</html>
